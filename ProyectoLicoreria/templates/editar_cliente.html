{% extends 'base.html' %}
{% block title %}Editar Cliente - Licorería{% endblock %}

{% block content %}
<div class="page-header">
  <h1>✏️ Editar Cliente</h1>
  <p>Modificando: <strong style="color:#c9a84c">{{ cliente.nombre }}</strong></p>
</div>

<div class="form-card">
  <form method="POST" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" name="nombre" class="form-control"
             value="{{ cliente.nombre }}" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Cédula</label>
        <input type="text" name="cedula" class="form-control"
               value="{{ cliente.cedula }}" required>
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" name="telefono" class="form-control"
               value="{{ cliente.telefono or '' }}">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-control"
             value="{{ cliente.email or '' }}">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" name="direccion" class="form-control"
             value="{{ cliente.direccion or '' }}">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Actualizar Cliente</button>
      <a href="{{ url_for('clientes') }}" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
